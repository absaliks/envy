- name: dev
  children:
    - name: dev-eu
      k8sContext: nonprod.eu-west-1
    - name: dev-us
      k8sContext: nonprod.us-east-1

- name: stg
  children:
    - name: stg-eu
      k8sContext: staging.eu-west-1
      resolutionPath: [stg-eu, stg, prod-eu-west, prod-eu-central, prod-eu, prod]
    - name: stg-us
      k8sContext: staging.us-east-1
      resolutionPath: [stg-eu, stg, prod-us-east, prod-us-west, prod-us, prod]

- name: prod
  children:
    - name: prod-eu
      children:
        - name: prod-eu-west
          k8sContext: prod.eu-west-1
        - name: prod-eu-central
          k8sContext: prod.eu-central-1
    - name: prod-us
      children:
        - name: prod-us-east
          k8sContext: prod.us-east-1
        - name: prod-us-west
          k8sContext: prod.us-west-2